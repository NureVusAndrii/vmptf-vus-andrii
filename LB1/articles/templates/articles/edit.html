{% load static %}
<link rel="stylesheet" href="{% static 'articles/style.css' %}">

<h1>Edit Article</h1>

<div class="form-container">
    <form method="post">
        {% csrf_token %}

        <label>Title</label>
        <input type="text" name="title" value="{{ article.title }}">

        <label>Text</label>
        <textarea name="text" rows="6">{{ article.text }}</textarea>

        <button class="button save-btn" type="submit">
            Save
        </button>
    </form>
</div>
