{% load static %}
<link rel="stylesheet" href="{% static 'articles/style.css' %}">

<h1>Create Article</h1>

<div class="form-container">
    <form method="post">
        {% csrf_token %}

        <label>Title</label>
        <input type="text" name="title">

        <label>Text</label>
        <textarea name="text" rows="6"></textarea>

        <button class="button save-btn" type="submit">
            Create
        </button>
    </form>
</div>
